name: Release Open Road

on:
  schedule:
    # Les GitHub Actions utilisent l'heure UTC. 
    # Le 15 juin à minuit en France (heure d'été), il est 22h00 le 14 juin en UTC.
    - cron: '0 22 14 6 *'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          ref: 'main' # Ou la branche où tu as préparé tes modifs

      - name: Appliquer la modif de sortie
        run: |
          # Ici tu peux par exemple renommer un fichier, ou changer une variable
          # Si tu as déjà tout préparé dans le code, tu peux juste forcer un commit vide pour trigger le build :
          git config --global user.name "Morgann Release Bot"
          git config --global user.email "bot@morgannmusic.com"
          git commit --allow-empty -m "Release officielle - Open Road"
          git push origin main
