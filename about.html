<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prochainement - Morgann Music</title>
    <link rel="stylesheet" href="navbar.css" />
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
     

        .prochainement-page {
            padding: 30px 20px;
            max-width: 1100px;
            margin: 60px auto 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .prochainement-page h1 {
            font-size: 28pt;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 24px;
            text-align: center;
            color: #fff;
            text-shadow: 0 10px 20px rgba(0,0,0,0.35);
        }

        .upcoming-card {
            background: rgba(30, 12, 40, 0.72);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            padding: 24px;
            
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .upcoming-cover img {
            width: 100%;
            border-radius: 20px;
            object-fit: cover;
            max-height: 430px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform .25s ease;
        }

        .upcoming-cover img:hover {
            transform: scale(1.02);
        }

        .upcoming-info h2 {
            font-size: clamp(0.75rem, 2vw, 1.5rem);
            margin: 0;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: #fff;
        }

        .upcoming-info .artist {
            margin: 8px 0 16px;
            font-size: clamp(0.6rem, 1.5vw, 0.75rem);
            font-weight: 600;
            color: #fdf0ff;
        }

        .upcoming-info .releases {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #ece5ff;
        }

        .upcoming-info .desc {
            font-size: 1.15rem;
            margin-bottom: 20px;
            color: #ebd8f5;
            line-height: 1.5;
        }

        .upcoming-platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .upcoming-platforms a {
            color: #451065;
            background: #f8d1ff;
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            transition: transform .25s ease, box-shadow .25s ease;
        }

        .upcoming-platforms a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, .2);
        }

        .upcoming-tags span {
            display: inline-block;
            margin: 0 8px 8px 0;
            padding: 8px 12px;
            border-radius: 15px;
            background: rgba(124, 53, 122, .45);
            font-size: .95rem;
            color: #ffe4ff;
        }

        @media(min-width: 900px) {
            .upcoming-card {
                grid-template-columns: 1fr 1.2fr;
                align-items: center;
            }

            .prochainement-page {
                padding: 40px 35px;
            }
        }

    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <script src="navbar.js"></script>

    <main class="prochainement-page">
        <h1>Autres infos</h1>


     <div class="row">
        <a href="mailto:contact.info@morgannmusic.uk">
            <button class="btn">Morgann Music</button>
        </a>

        <a href="mailto:elia.b.g@morgannmusic.uk">
            <button class="btn">Elia Music</button>

        </a>

        <a href="mailto:emilie@morgannmusic.uk">
            <button class="btn">Emilie</button>
        </a>

           
    </div>


    </main>


</body>
</html>
